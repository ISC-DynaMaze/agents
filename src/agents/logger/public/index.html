<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynaMaze Dashboard</title>
    <link rel="stylesheet" href="/static/index.css">
    <script src="/static/index.js"></script>
</head>
<body>
    <datalist id="recipients">
        <option value="logger@isc-coordinator.lan">Logger</option>
        <option value="alberto-robot@isc-coordinator.lan">Robot</option>
        <option value="alberto-ctrl@isc-coordinator.lan">Controller</option>
        <option value="camera@isc-coordinator.lan">Camera</option>
    </datalist>
    <h1>Dashboard</h1>
    <div id="host">
        <input type="text" id="xmpp-host" value="isc-coordinator.lan">
        <button id="set-xmpp-host">Set</button>
    </div>
    <div class="cards">
        <div id="sender" class="card">
            <h2 class="title">Sender</h2>
            <div class="content">
                <div class="message">
                    <label for="sender-message">Message</label>
                    <textarea name="message" id="sender-message"></textarea>
                </div>
                <div class="recipient">
                    <label for="sender-recipient">Recipient</label>
                    <input name="recipient"
                           id="sender-recipient"
                           type="text"
                           placeholder="agent@localhost"
                           list="recipients"/>
                </div>
                <button id="sender-send">Send</button>
            </div>
        </div>
        <div id="receiver" class="card">
            <h2 class="title">Receiver</h2>
            <div class="content">
                <div class="messages"></div>
            </div>
        </div>
        <div id="image" class="card">
            <h2 class="title">Image</h2>
            <div class="content">
                <img id="image-display">
            </div>
        </div>
        <div id="robot" class="card">
            <h2 class="title">Robot</h2>
            <div class="content">
                <section>
                    <h3>Camera</h3>
                    <div class="options">
                        <button id="take-pic">Take picture</button>
                        <button id="set-home">Set to home</button>
                        <div class="row">
                            <label for="current-pan">Current Pan:</label>
                            <div id="current-pan">0</div>
                        </div>
                        <div class="row">
                            <input type="number" min="-75" max="75" id="new-pan" value="0">
                            <button id="set-pan">Set pan</button>
                        </div>
                        <div class="row">
                            <label for="current-tilt">Current Tilt:</label>
                            <div id="current-tilt">0</div>
                        </div>
                        <div class="row">
                            <input type="number" min="0" max="45" id="new-tilt" value="0">
                            <button id="set-tilt">Set tilt</button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</body>
</html>
