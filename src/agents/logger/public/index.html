<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynaMaze Dashboard</title>
    <link rel="stylesheet" href="/static/fontawesome/css/fontawesome.min.css">
    <link rel="stylesheet" href="/static/fontawesome/css/solid.min.css">
    <link rel="stylesheet" href="/static/index.css">
    <script src="/static/index.js" type="module"></script>
</head>
<body>
    <div class="template message" id="bookmark-template">
        <input type="text" class="name">
        <button class="button send">Send <i class="fa-solid fa-paper-plane"></i></button>
        <button class="button delete"><i class="fa-solid fa-trash-can"></i></button>
        <div class="recipient"></div>
    </div>
    <datalist id="recipients">
        <option value="logger@isc-coordinator.lan">Logger</option>
        <option value="alberto-robot@isc-coordinator.lan">Robot</option>
        <option value="alberto-ctrl@isc-coordinator.lan">Controller</option>
        <option value="camera@isc-coordinator.lan">Camera</option>
    </datalist>
    <h1>Dashboard</h1>
    <div id="host">
        <label for="xmpp-host">Host</label>
        <input type="text" id="xmpp-host" value="isc-coordinator.lan">
        <button class="button" id="set-xmpp-host">Set</button>
    </div>
    <div class="cards">
        <div id="sender" class="card">
            <h2 class="title">Sender</h2>
            <div class="content">
                <section>
                    <h3>Recipient</h3>
                    <div class="row" id="recipient-type">
                        <div class="opt">
                            <input type="radio"
                                   name="recipient-type"
                                   id="recipient-type-predefined"
                                   value="predefined"
                                   checked>
                            <label for="recipient-type-predefined">Predefined</label>
                        </div>
                        <div class="opt">
                            <input type="radio"
                                   name="recipient-type"
                                   id="recipient-type-manual"
                                   value="manual">
                            <label for="recipient-type-manual">Manual</label>
                        </div>
                    </div>
                    <div class="row" id="recipient">
                        <select name="recipient-predefined" data-type="predefined" class="show">
                            <option value="logger">Logger</option>
                            <option value="alberto-robot">Robot</option>
                            <option value="alberto-ctrl">Controller</option>
                            <option value="camera">Camera</option>
                        </select>
                        <input type="text" name="recipient-manual" data-type="manual" />
                    </div>
                </section>
                <section>
                    <h3>JSON Body</h3>
                    <div id="sender-message"></div>
                </section>
                <div class="actions">
                    <button class="button" id="sender-save">Save <i class="fa-solid fa-bookmark"></i></button>
                    <button class="button" id="sender-send">Send <i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
        <div id="saved" class="card">
            <h2>Saved messages</h2>
            <div class="content">
                <div id="saved-messages"></div>
            </div>
        </div>
        <div id="bot-cam" class="card">
            <h2 class="title">Robot Camera</h2>
            <div class="content">
                <section>
                    <img id="image-display">
                </section>
                <section>
                    <div class="actions">
                        <button class="button" id="take-pic">Take picture</button>
                        <button class="button" id="set-home">Set to home</button>
                    </div>
                </section>
                <section>
                    <div class="angles">
                        <div class="pan">
                            <label for="set-pan">Pan</label>
                            <div class="current">0°</div>
                            <input type="range" id="set-pan" min="-75" max="75" step="1" value="0">
                        </div>
                        <div class="tilt">
                            <label for="set-tilt">Tilt</label>
                            <div class="current">0°</div>
                            <input type="range" id="set-tilt" min="0" max="45" step="1" value="0">
                        </div>
                    </div>
                    <div class="nudge">
                        <button class="up"><i class="fa-solid fa-caret-up"></i></button>
                        <button class="left"><i class="fa-solid fa-caret-left"></i></button>
                        <button class="right"><i class="fa-solid fa-caret-right"></i></button>
                        <button class="down"><i class="fa-solid fa-caret-down"></i></button>
                    </div>
                </section>
            </div>
        </div>
        <div id="logger" class="card">
            <h2 class="title">Logger</h2>
            <div class="content">
                <table id="messages"></table>
            </div>
        </div>
    </div>
</body>
</html>
